# Environment-mode products currently validated (NetSec PoC)
products:

  asa:
    display_name: "ASA"
    friendly_name: "Cisco Adaptive Security Appliance"
    group: "netsec"
    api_type: "asa"
    classification_product: "ASA"
    aliases:
      - "asa"
      - "adaptive-security-appliance"

  ftd:
    display_name: "FTD"
    friendly_name: "Cisco Secure Firewall Threat Defense"
    group: "netsec"
    api_type: "ftd"
    classification_product: "FTD"
    aliases:
      - "ftd"
      - "firepower-threat-defense"
      - "secure-firewall-threat-defense"
      - "threat-defense"

  fmc:
    display_name: "FMC"
    friendly_name: "Cisco Secure Firewall Management Center"
    group: "netsec"
    api_type: "fmc"
    classification_product: "FMC"
    aliases:
      - "fmc"
      - "firepower-management-center"
      - "secure-firewall-management-center"

  fxos:
    display_name: "FXOS"
    friendly_name: "Cisco Firepower Extensible Operating System"
    group: "netsec"
    api_type: "fxos"
    classification_product: "FXOS"
    aliases:
      - "fxos"
      - "firepower-extensible-operating-system"

